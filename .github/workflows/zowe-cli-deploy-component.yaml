name: Zowe CLI Deploy Component

on:
  workflow_call:
    inputs:
      pkg-name:
        required: true
        type: string
      pkg-tags:
        required: true
        type: string
      cli-deploy-all-workflow-id:
        description: "The workflow ID from the CLI Deploy All Workflow. This should NOT be specified by any other calling workflow."
        required: false
        type: string
    secrets:
      NPM_PUBLIC_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      pkg-name:
        description: "Name of the package to be deployed (the @zowe scope will be prepended)"
        default: "cli"
        required: true
      pkg-tags:
        description: "Tags to be distributed from Artifactory (separate multiple by spaces)"
        default: "latest"
        required: true
      dry-run:
        description: "Test repackaging only and skip publish step"
        default: false
        required: false
        type: boolean

permissions:
  issues: write
  id-token: write
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PKG_NAME: ${{ inputs.pkg-name }}
      PKG_TAGS: ${{ inputs.pkg-tags }}
      NPM_CONFIG_PROVENANCE: "false"

    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: 'zowe/zowe-cli-standalone-package'

    - name: Use Node.js LTS
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        # Stay back one major release to avoid bugs in unstable npm versions
        node-version: 'lts/-1'
        cache: ${{ (!env.ACT && 'npm') || '' }}

    # Python 3.12 breaks node-gyp < 10, breaking current versions of Node 18/20 (as of Nov 9, 2023) - awharn
    - name: Downgrade Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.11.5'

    - name: Install Dependencies
      run: npm ci

    - name: Download Workflow Artifact From Deploy All
      if: ${{ inputs.cli-deploy-all-workflow-id }}
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: publish-list
        github-token: ${{ secrets.GITHUB_TOKEN }}
        run-id: ${{ inputs.cli-deploy-all-workflow-id }}

    - name: Exchange OIDC Token
      if: false
      continue-on-error: true
      id: oidc
      uses: electron/npm-trusted-auth-action@418d14975a3ff06683cc4580a4eba437f0f017f1 # 418d14975a3ff06683cc4580a4eba437f0f017f1
      with:
        package-name: "@zowe/${{ env.PKG_NAME }}"

    - name: Replace .npmrc
      if: ${{ steps.oidc.outcome == 'success' }}
      run: |
        echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
        echo "omit-lockfile-registry-resolved=true" >> ~/.npmrc

    - name: NPM Login (backup)
      if: ${{ steps.oidc.outcome == 'skipped' || steps.oidc.outcome == 'failure' }}
      run: |
        bash scripts/npm_login.sh ${{ env.NPM_REGISTRY || 'https://registry.npmjs.org/' }}
        echo "omit-lockfile-registry-resolved=true" >> ~/.npmrc
        echo "::add-mask::$NPM_TOKEN"
      env:
        NPM_TOKEN: ${{ secrets.NPM_PUBLIC_TOKEN }}

    - name: Deploy Package
      id: deploy
      run: node scripts/deploy-component.js ${{ env.PKG_NAME }} ${{ env.PKG_TAGS }}
      env:
        DRY_RUN: ${{ inputs.dry-run }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: NPM Logout
      if: ${{ always() && steps.oidc.outcome == 'success' }}
      run: "npm logout"

    - name: Create Issue
      if: ${{ failure() }}
      uses: JasonEtco/create-an-issue@1b14a70e4d8dc185e5cc76d3bec9eab20257b2c5 # v2
      env:
        ERROR_REPORT: ${{ steps.deploy.outputs.errors }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      with:
        filename: .github/deploy-failed.md
        update_existing: true

    - name: Close Issue
      if: ${{ success() && inputs.cli-deploy-all-workflow-id }}
      uses: lee-dohm/close-matching-issues@e9e43aad2fa6f06a058cedfd8fb975fd93b56d8f # v2
      with:
        query: '"Failed to deploy @zowe/${{ env.PKG_NAME }}" in:title'
        token: ${{ secrets.GITHUB_TOKEN }}
